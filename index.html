<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medību Eksāmens — Mācību Rīks</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        
        body { font-family: 'Roboto', sans-serif; background: #f4f7f6; margin: 0; padding: 0; color: #333; }
        
        /* PAROLES EKRĀNS */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a2a1a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999; color: white;
        }
        .login-box { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 15px; backdrop-filter: blur(10px); text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .login-box input { padding: 12px; font-size: 18px; border-radius: 8px; border: none; margin: 15px 0; width: 200px; text-align: center; }
        .login-box button { background: #2c5f2c; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* GALVENAIS SATURS */
        #main-content { display: none; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; }
        header { background: #2c5f2c; color: white; padding: 25px; text-align: center; border-radius: 10px; margin-bottom: 20px; }

        /* GALERIJA (ŠPIKERIS) */
        .gallery-section { margin-bottom: 40px; padding: 20px; background: #f9f9f9; border-radius: 10px; border: 1px solid #eee; }
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
        }
        .gallery-item { text-align: center; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .gallery-item img { width: 100%; height: 220px; object-fit: cover; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .gallery-item img:hover { transform: scale(1.02); }
        .gallery-label { font-weight: bold; font-size: 15px; margin-top: 10px; color: #2c5f2c; text-transform: uppercase; }

        /* MEKLĒŠANA */
        .search-container {
            position: sticky; top: 10px; z-index: 100; background: white; padding: 15px;
            border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px;
            display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
        }
        input[type="text"] { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        
        /* JAUTĀJUMI UN LIELĀS BILDES */
        .question-block { padding: 30px 0; border-bottom: 2px solid #f0f0f0; }
        .q-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: block; color: #1a2a1a; }
        
        .img-holder { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: flex-start; }
        .img-holder img { 
            height: 550px; /* Ļoti lielas bildes */
            max-width: 100%; 
            border-radius: 12px; 
            border: 2px solid #ddd; 
            object-fit: contain;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: #fff;
        }
        
        .options { max-width: 600px; }
        .opt { padding: 15px; margin: 8px 0; border-radius: 8px; background: #f9f9f9; border: 2px solid #eee; cursor: pointer; transition: 0.2s; font-size: 17px; }
        
        /* ATBILDES KRĀSAS */
        .show-answers .correct { background: #e8f5e9; border-color: #2e7d32; color: #1b5e20; font-weight: bold; }
        .show-answers .correct::before { content: "✅ "; }
        .hide-answers .opt.revealed-correct { background: #e8f5e9; border-color: #2e7d32; color: #1b5e20; font-weight: bold; }
        .hide-answers .opt.revealed-wrong { background: #ffebee; border-color: #c62828; color: #b71c1c; }

        /* SLĒDZIS */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2c5f2c; }
        input:checked + .slider:before { transform: translateX(26px); }

        #scrollTop { position: fixed; bottom: 20px; right: 20px; background: #2c5f2c; color: white; border: none; padding: 15px; border-radius: 50%; cursor: pointer; display: none; z-index: 1000; }
    </style>
</head>

</div>
