        body { font-family: 'Roboto', sans-serif; background: #f4f7f6; margin: 0; padding: 0; color: #333; transition: 0.3s; }
        
        /* PAROLES EKRĀNS */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a2a1a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999; color: white;
        }
        .login-box { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 15px; backdrop-filter: blur(10px); text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .login-box input { padding: 12px; font-size: 18px; border-radius: 8px; border: none; margin: 15px 0; width: 200px; text-align: center; }
        .login-box button { background: #2c5f2c; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* GALVENAIS SATURS */
        #main-content { display: none; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; }
        header { background: #2c5f2c; color: white; padding: 25px; text-align: center; border-radius: 10px; margin-bottom: 20px; }

        /* GALERIJA (ŠPIKERIS) */
        .gallery-section { margin-bottom: 40px; padding: 20px; background: #f9f9f9; border-radius: 10px; border: 1px solid #eee; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .gallery-item { text-align: center; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .gallery-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .gallery-item img:hover { transform: scale(1.05); }
        .gallery-label { font-weight: bold; font-size: 12px; margin-top: 8px; color: #2c5f2c; text-transform: uppercase; }

        /* MEKLĒŠANA UN KONTROLES */
        .search-container {
            position: sticky; top: 10px; z-index: 100; background: white; padding: 15px;
            border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px;
            display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
        }
        input[type="text"] { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        
        /* JAUTĀJUMI */
        .question-block { padding: 25px; border-bottom: 1px solid #eee; }
        .q-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; display: block; color: #1a2a1a; }
        .img-holder { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .img-holder img { height: 120px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; }
        
        .opt { padding: 12px 15px; margin: 5px 0; border-radius: 6px; background: #f9f9f9; border: 2px solid #eee; cursor: pointer; transition: 0.2s; }
        
        /* MODAL (BILDES PALIELINĀŠANA) */

            display: none; position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; cursor: zoom-out;
        }
        #modalImg { max-width: 95%; max-height: 95%; border-radius: 5px; }

        /* ATBILDES */
        .show-answers .correct { background: #e8f5e9; border-color: #2e7d32; color: #1b5e20; font-weight: bold; }
        .show-answers .correct::before { content: "✅ "; }

        .hide-answers .opt.revealed-wrong { background: #ffebee; border-color: #c62828; color: #b71c1c; }

        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2c5f2c; }
        input:checked + .slider:before { transform: translateX(26px); }

        #scrollTop { position: fixed; bottom: 20px; right: 20px; background: #2c5f2c; color: white; border: none; padding: 15px; border-radius: 50%; cursor: pointer; display: none; }

// --- FUNKCIJAS ---

function zoomImg(src) {
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImg');
    modal.style.display = "flex";
    modalImg.src = src;
}

async function checkPassword() {
    const input = document.getElementById('pinCode').value.trim();
    const errorEl = document.getElementById('login-error');
    const correctHash = "8b74cd1290fe14c722dbbcb3d777f8704e142406842d125865ab4a2b08c93c40"; 
    
    const encoder = new TextEncoder();
    const data = encoder.encode(input);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    
    if (hashHex === correctHash) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        renderGallery();
        renderQuestions();
    } else {
        errorEl.innerText = "Nepareizs kods. Mēģiniet vēlreiz.";
        document.getElementById('pinCode').value = "";
    }
}

function renderGallery() {
    const container = document.getElementById('galleryContainer');
    container.innerHTML = "";
    allQuestions.forEach(q => {
        const bilde = q.imageTrack || q.imageReal || q.imageMale;
        if (bilde) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            const name = q.options[q.answer];
            item.innerHTML = `
                <img src="${bilde}" onclick="zoomImg('${bilde}')" alt="${name}">
                <div class="gallery-label">${name}</div>
            `;
            container.appendChild(item);
        }
    });
}

function renderQuestions(filter = "") {
    const list = document.getElementById('questionsList');
    list.innerHTML = "";
    let count = 0;

    allQuestions.forEach(q => {
        const searchText = (q.question + q.options.join(" ")).toLowerCase();
        if (searchText.includes(filter.toLowerCase())) {
            count++;
            const div = document.createElement('div');
            div.className = 'question-block';
            
            let imgHtml = "";
            if (q.imageTrack || q.imageScat || q.imageReal || q.imageMale || q.imageFemale) {
                imgHtml = `<div class="img-holder">`;
                if(q.imageTrack) imgHtml += `<img src="${q.imageTrack}" onclick="zoomImg('${q.imageTrack}')" title="Pēdas / Foto">`;
                if(q.imageMale) imgHtml += `<img src="${q.imageMale}" onclick="zoomImg('${q.imageMale}')" title="Tēviņš ♂">`;
                if(q.imageFemale) imgHtml += `<img src="${q.imageFemale}" onclick="zoomImg('${q.imageFemale}')" title="Mātīte ♀">`;
                if(q.imageScat) imgHtml += `<img src="${q.imageScat}" onclick="zoomImg('${q.imageScat}')" title="Izkārnījumi">`;
                if(q.imageReal) imgHtml += `<img src="${q.imageReal}" onclick="zoomImg('${q.imageReal}')" title="Dzīvnieks dabā">`;
                imgHtml += `</div>`;
            }

            const options = q.options.map((opt, i) => `
                <div class="opt ${i === q.answer ? 'correct' : ''}" onclick="handleOptClick(this, ${i === q.answer})">
                    ${opt}
                </div>
            `).join('');

            div.innerHTML = `<span class="q-title">${q.id}. ${q.question}</span>${imgHtml}<div class="options">${options}</div>`;
            list.appendChild(div);
        }
    });
    document.getElementById('counter').innerText = `Atrasti: ${count}`;
}

function handleOptClick(el, isCorrect) {
    if (!document.getElementById('modeToggle').checked) {
        el.classList.add(isCorrect ? 'revealed-correct' : 'revealed-wrong');
        if(!el.innerText.includes("✅") && !el.innerText.includes("❌")) {
            el.innerText = (isCorrect ? "✅ " : "❌ ") + el.innerText;
        }
    }
}

document.getElementById('modeToggle').addEventListener('change', (e) => {
    document.body.className = e.target.checked ? "show-answers" : "hide-answers";
    renderQuestions(document.getElementById('searchInput').value);
});
