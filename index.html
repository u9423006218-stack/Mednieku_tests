        /* PAROLES EKRĀNS */

        /* MEKLĒŠANA UN TESTA RĪKI */

/* Jautājumu bilžu izmērs */

/* Augšējā špikera (galerijas) izmērs */
.gallery-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); /* No 180px uz 280px */
    gap: 20px; 
}        
        .opt { padding: 12px 15px; margin: 5px 0; border-radius: 6px; background: #f9f9f9; border: 2px solid #eee; cursor: pointer; transition: 0.2s; }
        
        /* ATBILDES */

        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2c5f2c; }

// --- PAROLES PĀRBAUDE ---
async function checkPassword() {
    const input = document.getElementById('pinCode').value.trim();
    const errorEl = document.getElementById('login-error');
    const correctHash = "8b74cd1290fe14c722dbbcb3d777f8704e142406842d125865ab4a2b08c93c40"; // L0de_svins_:)
    
    const encoder = new TextEncoder();
    const data = encoder.encode(input);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    
    if (hashHex === correctHash) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        renderGallery();
        renderQuestions();
    } else {
        errorEl.innerText = "Nepareizs kods.";
    }
}

// --- GALERIJA (ŠPIKERIS) ---
function renderGallery() {
    const container = document.getElementById('galleryContainer');
    container.innerHTML = "";
    
    allQuestions.forEach(q => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        const name = q.options[q.answer];
        
        item.innerHTML = `
            <img src="${q.imageTrack}" alt="${name}">
            <div class="gallery-label">${name}</div>
        `;
        container.appendChild(item);
    });
}

// --- TESTA RENDERĒŠANA ---
function renderQuestions(filter = "") {
    const list = document.getElementById('questionsList');
    list.innerHTML = "";
    let count = 0;

    allQuestions.forEach(q => {
        const name = q.options[q.answer].toLowerCase();
        if (name.includes(filter.toLowerCase()) || q.question.toLowerCase().includes(filter.toLowerCase())) {
            count++;
            const div = document.createElement('div');
            div.className = 'question-block';
            
          // Atrodi šo bloku funkcijā renderQuestions:
let imgHtml = `<div class="img-holder">`;
imgHtml += `<img src="${q.imageTrack}" title="Pēda/Foto" style="height: 300px;">`; // Pievienots stils šeit
if(q.imageScat) imgHtml += `<img src="${q.imageScat}" title="Mēsli" style="height: 300px;">`;
if(q.imageReal) imgHtml += `<img src="${q.imageReal}" title="Reālā kāja" style="height: 300px;">`;
imgHtml += `</div>`;

            const options = q.options.map((opt, i) => `
                <div class="opt ${i === q.answer ? 'correct' : ''}" onclick="handleOptClick(this, ${i === q.answer})">
                    ${opt}
                </div>
            `).join('');

            div.innerHTML = `<span class="q-title">${q.id}. ${q.question}</span>${imgHtml}<div class="options">${options}</div>`;
            list.appendChild(div);
        }
    });
    document.getElementById('counter').innerText = `Atrasti: ${count}`;
}

function handleOptClick(el, isCorrect) {
    if (!document.getElementById('modeToggle').checked) {
        el.classList.add(isCorrect ? 'revealed-correct' : 'revealed-wrong');
        el.innerText = (isCorrect ? "✅ " : "❌ ") + el.innerText;
    }
}

document.getElementById('modeToggle').addEventListener('change', (e) => {
    document.body.className = e.target.checked ? "show-answers" : "hide-answers";
    renderQuestions(document.getElementById('searchInput').value);
});

document.getElementById('searchInput').addEventListener('input', (e) => renderQuestions(e.target.value));

window.onscroll = () => {
    document.getElementById("scrollTop").style.display = (window.scrollY > 500) ? "block" : "none";
